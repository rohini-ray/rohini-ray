name: Add Japan Video Animation

on:
  workflow_dispatch:

  schedule:
    - cron: "30 18 * * *"

permissions:
  contents: write

jobs:
  convert-video:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Convert Japan MP4 to GIF
        run: |
          mkdir -p assets

          ffmpeg -i assets/japan.mp4 \
          -vf "fps=15,scale=800:-1" \
          -loop 0 \
          assets/japan-animation.gif

      - name: Commit and Push GIF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/japan-animation.gif

          git commit -m "Update Japan animation GIF" || echo "No changes"

          git pull --rebase origin main

          git push origin HEAD:${{ github.ref_name }}
