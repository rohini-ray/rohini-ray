name: Generate Profile Animation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create animation file
        run: |
          mkdir -p assets
          echo "Japanese animation updated $(date)" > assets/status.txt

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/status.txt

          git diff --cached --quiet || git commit -m "Update animation"

          git push origin HEAD:${{ github.ref_name }}
