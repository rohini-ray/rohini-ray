name: Generate Profile Animation

on:
  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:

      # Get repository files
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Create animation folder
      - name: Create assets folder
        run: |
          mkdir -p assets

      # Generate/update animation file
      # Replace this section with your GIF generation script
      - name: Generate animation
        run: |
          echo "Japanese animation updated at $(date)" > assets/status.txt

      # Commit changes and push
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/

          git commit -m "Update profile animation" || echo "No changes to commit"

          git pull --rebase origin main

          git push origin main
