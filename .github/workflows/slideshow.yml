name: Create Profile Slideshow

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get install imagemagick -y

      - name: Create GIF
        run: |
          convert \
          assets/image1.png \
          assets/image2.png \
          -delay 150 \
          -loop 0 \
          assets/slideshow.gif

      - name: Commit GIF
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add assets/slideshow.gif
          git commit -m "Update slideshow" || exit 0
          git push
