name: Japanese Profile Animation

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:


jobs:

  animation:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install Pillow
        run: |
          pip install pillow


      - name: Generate Animation
        run: |
          python generate_animation.py


      - name: Commit Animation
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add assets/japan-animation.gif
          git commit -m "Update Japanese animation" || echo "No changes"

          git push
